<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Information</title>

<style>
    body{
        margin:0;
        font-family:Arial, sans-serif;
        background:linear-gradient(to right,#4facfe,#00f2fe);
    }

    .container{
        width:400px;
        margin:50px auto;
        background:#fff;
        border-radius:15px;
        box-shadow:0 5px 15px rgba(0,0,0,0.3);
        overflow:hidden;
    }

    .header{
        background:#1e88e5;
        color:white;
        text-align:center;
        padding:20px;
    }

    .profile{
        text-align:center;
        margin-top:20px;
    }

    .profile img{
        width:120px;
        height:120px;
        border-radius:50%;
        border:4px solid #1e88e5;
    }

    table{
        width:90%;
        margin:20px auto;
        border-collapse:collapse;
    }

    table td{
        padding:12px;
        border-bottom:1px solid #ddd;
    }

    table tr:hover{
        background:#f2f2f2;
    }

    .footer{
        background:#1e88e5;
        color:white;
        text-align:center;
        padding:10px;
        font-size:14px;
    }
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2>Student Information</h2>
    </div>

    <div class="profile">
        <img src="https://via.placeholder.com/120" alt="Student Photo">
    </div>

    <table>
        <tr>
            <td><b>Name</b></td>
            <td>Ian Yvez M. Marquez</td>
        </tr>

        <tr>
            <td><b>Grade</b></td>
            <td>Grade 9</td>
        </tr>

        <tr>
            <td><b>Section</b></td>
            <td>Galatians</td>
        </tr>

        <tr>
            <td><b>Age</b></td>
            <td>14</td>
        </tr>

        <tr>
            <td><b>School Year</b></td>
            <td>2026–2027</td>
        </tr>

        <tr>
            <td><b>Status</b></td>
            <td>Active Student</td>
        </tr>
    </table>

    <div class="footer">
        Grade 9 HTML Activity
    </div>

</div>

</body>
</html>
